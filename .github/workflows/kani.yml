name: Kani Verification

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Run Kani from within crates/core, NOT from the workspace root.
      #
      # Why: the root Cargo.toml is a virtual workspace that also declares the
      # mizu-navigator package, which depends on parley → yeslogic-fontconfig-sys.
      # That crate requires `fontconfig` as a native system library.  When Kani
      # runs from the workspace root it resolves and builds all members, triggering
      # fontconfig's build script even for -p mizu-core.  Entering crates/core
      # before invoking Kani means only mizu-core's own dependency tree is visible.
      - name: Run Kani Proofs
        uses: model-checking/kani-github-action@v1
        with:
          working-directory: crates/core
